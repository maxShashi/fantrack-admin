<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FanTrack Pro — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--surface:#0d1117;--card:#111827;--card2:#161e2e;
  --border:#1f2937;--accent:#a855f7;--accent2:#ec4899;
  --text:#f1f5f9;--muted:#6b7280;--success:#10b981;--danger:#ef4444;--info:#38bdf8;
  --sb-w:230px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}

/* ── LOGIN ── */
#loginPage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 80% 60% at 50% 40%,#1a0533 0%,var(--bg) 70%);z-index:100}
.login-wrap{width:100%;max-width:380px;padding:0 20px}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;
  box-shadow:0 0 40px rgba(168,85,247,.4)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px;
  box-shadow:0 32px 64px rgba(0,0,0,.6)}
.lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
.inp{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);
  border-radius:10px;padding:11px 14px;font-size:14px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  border:none;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;
  transition:opacity .2s;width:100%}
.btn-primary:hover{opacity:.88}

/* ── TOPBAR (mobile) ── */
#app{display:none}
.topbar{display:none;position:fixed;top:0;left:0;right:0;height:52px;background:var(--surface);
  border-bottom:1px solid var(--border);z-index:30;align-items:center;padding:0 14px;gap:12px}
.topbar-brand{font-size:15px;font-weight:700;flex:1}
.topbar-sub{font-size:10px;color:var(--muted)}
.hamburger{background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:17px;flex-shrink:0;transition:background .15s}
.hamburger:hover{background:var(--card)}

/* ── OVERLAY ── */
#sbOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:18;backdrop-filter:blur(2px)}

/* ── SIDEBAR ── */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sb-w);background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:20;
  transition:transform .25s cubic-bezier(.4,0,.2,1)}
.sidebar.collapsed{transform:translateX(calc(-1 * var(--sb-w)))}
.sidebar-brand{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* collapse toggle on desktop */
.sb-toggle{display:flex;align-items:center;justify-content:center;width:24px;height:24px;
  border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);
  cursor:pointer;font-size:11px;margin-left:auto;flex-shrink:0;transition:all .15s}
.sb-toggle:hover{background:var(--card2);color:var(--text)}

nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;
  cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;user-select:none}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(168,85,247,.18),rgba(236,72,153,.12));
  color:#d8b4fe;border-left:2px solid var(--accent);padding-left:10px}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sidebar-footer{padding:14px 12px;border-top:1px solid var(--border)}

/* ── MAIN ── */
.main{margin-left:var(--sb-w);padding:28px 32px;min-height:100vh;transition:margin-left .25s cubic-bezier(.4,0,.2,1)}
.main.full{margin-left:0}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px}
.stat-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);
  color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #0f1623;font-size:13px;vertical-align:middle}
tbody tr:hover td{background:rgba(255,255,255,.018)}
.tfoot-row td{border-top:1px solid var(--border);border-bottom:none;font-weight:600;background:var(--card2)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(16,185,129,.15);color:#34d399}
.badge-red{background:rgba(239,68,68,.12);color:#f87171}
.badge-gray{background:rgba(107,114,128,.15);color:#9ca3af}
.badge-purple{background:rgba(168,85,247,.15);color:#c084fc}

/* ── MISC ── */
.section-title{font-size:20px;font-weight:700;margin-bottom:4px}
.section-sub{font-size:13px;color:var(--muted);margin-bottom:22px}
.inp-sm{background:var(--surface);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:7px 11px;font-size:13px;outline:none}
.inp-sm:focus{border-color:var(--accent)}
select.inp-sm option{background:var(--card)}
.btn-sm{border-radius:7px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;
  border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
.btn-sm:hover{background:var(--card2);color:var(--text)}
.btn-danger{border-color:rgba(239,68,68,.3);color:#f87171}
.btn-danger:hover{background:rgba(239,68,68,.1)}
.gradient-text{background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mono{font-family:ui-monospace,SFMono-Regular,monospace}
.lang-btn{background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3);color:#c084fc;
  border-radius:7px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:700;transition:all .15s}
.lang-btn:hover{background:rgba(168,85,247,.25)}

/* ════════════════════════════════
   MOBILE  ≤ 768px
════════════════════════════════ */
@media(max-width:768px){
  .topbar{display:flex}
  .sidebar{top:52px;transform:translateX(calc(-1 * var(--sb-w)))}
  .sidebar.open{transform:translateX(0)}
  #sbOverlay.show{display:block}
  .main{margin-left:0;padding:16px 14px;padding-top:68px}
  .main.full{margin-left:0}

  /* 4-col → 2-col on phone */
  .grid-4{grid-template-columns:1fr 1fr;gap:10px}
  .grid-2{grid-template-columns:1fr;gap:10px}

  /* stat card smaller text */
  .stat-card .big-num{font-size:22px !important}

  /* card padding tighter */
  .card{padding:14px}

  /* overview header stack */
  .ov-header{flex-direction:column !important;align-items:flex-start !important;gap:8px !important}
  .ov-date-pill{font-size:11px !important;padding:5px 9px !important}

  /* lp card stack */
  .lp-card-inner{flex-direction:column !important;align-items:flex-start !important;gap:10px}
  .lp-card-actions{flex-wrap:wrap}

  /* table horizontal scroll */
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:520px}

  /* daily stats mini */
  .dy-jump-row{flex-direction:column !important;align-items:flex-start !important}

  /* section title */
  .section-title{font-size:17px}

  .login-card{padding:24px 20px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-wrap">
    <div class="login-logo">

      </div>
      <div style="font-size:22px;font-weight:800;letter-spacing:-.3px">FanTrack Pro</div>
      <div id="login-sub" style="font-size:13px;color:var(--muted);margin-top:3px"></div>
    </div>
    <div class="login-card">
      <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
        <button class="lang-btn" onclick="toggleLang()" id="loginLangBtn"></button>
      </div>
      <div style="margin-bottom:16px">
        <label class="lbl" id="lbl-user"></label>
        <input id="lu" class="inp" type="text" autocomplete="off">
      </div>
      <div style="margin-bottom:22px">
        <label class="lbl" id="lbl-pass"></label>
        <input id="lp" class="inp" type="password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-primary" onclick="doLogin()" id="btn-signin"></button>
      <p id="lerr" style="display:none;text-align:center;font-size:12px;color:var(--danger);margin-top:12px"></p>
    </div>
  </div>
</div>

<!-- APP -->

  <div class="sidebar" id="sidebar">

      </div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700">FanTrack</div>
        <div id="sb-portal" style="font-size:10px;color:var(--muted)"></div>
      </div>
      <button class="sb-toggle" onclick="toggleDesktopSidebar()" id="desktopToggle" title="收起菜单">◀</button>
    </div>
    <!-- PROJECT SELECTOR -->
    <div style="padding:10px 12px 8px;border-bottom:1px solid var(--border)">
      <div id="sb-proj-label" style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px"></div>
      <div style="position:relative">
        <select id="projSelect" onchange="onProjChange(this)" style="width:100%;background:var(--card2);border:1px solid var(--border);
          color:var(--text);border-radius:8px;padding:7px 28px 7px 10px;font-size:12px;font-weight:600;
          outline:none;-webkit-appearance:none;cursor:pointer">
          <option value="TB48201" disabled style="color:#4b5563">TB48201</option>
          <option value="NS45876" disabled style="color:#4b5563">NS45876</option>

          <option value="CY52600" disabled style="color:#4b5563">CY52600</option>

          <option value="AX28695" disabled style="color:#4b5563">AX28695</option>
          <option value="JN97796" disabled style="color:#4b5563">JN97796</option>
          <option value="VD10846" disabled style="color:#4b5563">VD10846</option>
          <option value="EV51977" disabled style="color:#4b5563">EV51977</option>
          <option value="SA98483" disabled style="color:#4b5563">SA98483</option>
          <option value="KQ11040" disabled style="color:#4b5563">KQ11040</option>
          <option value="DW94914">DW94914</option>
          <option value="PX12356" disabled style="color:#4b5563">PX12356</option>
          <option value="GT20972" disabled style="color:#4b5563">GT20972</option>
          <option value="LP40408" disabled style="color:#4b5563">LP40408</option>
          <option value="MR58255" disabled style="color:#4b5563">MR58255</option>
        </select>
        <div style="position:absolute;right:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:10px">▾</div>
      </div>
    </div>

    <nav>
      <div class="nav-item active" id="n-ov" onclick="go('ov')"><span class="nav-icon">📊</span><span id="nav-ov"></span></div>
      <div class="nav-item" id="n-dy" onclick="go('dy')"><span class="nav-icon">📅</span><span id="nav-dy"></span></div>
      <div class="nav-item" id="n-wa" onclick="go('wa')"><span class="nav-icon">📱</span><span id="nav-wa"></span></div>
      <div class="nav-item" id="n-lp" onclick="go('lp')"><span class="nav-icon">🔗</span><span id="nav-lp"></span></div>
      <div class="nav-item" id="n-ap" onclick="go('ap')"><span class="nav-icon">🔑</span><span id="nav-ap"></span></div>
    </nav>
    <div class="sidebar-footer">

        <div>

          <div id="sb-role" style="font-size:11px;color:var(--muted)"></div>
        </div>
        <button onclick="doLogout()" class="btn-sm" id="sb-logout" style="font-size:11px"></button>
      </div>
      <button class="lang-btn" style="width:100%" onclick="toggleLang()" id="appLangBtn"></button>
    </div>
  </div>
  <div class="main" id="mainArea">
    <div id="v-ov"></div>
    <div id="v-dy" style="display:none"></div>
    <div id="v-wa" style="display:none"></div>
    <div id="v-lp" style="display:none"></div>
    <div id="v-ap" style="display:none"></div>
  </div>
</div>

}

function srng(s) {
  s = s | 0;
  s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
  s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
  return ((s ^ (s >>> 16)) >>> 0) / 4294967296;
}

function s2i(str) { return Math.round((new Date(str)-T0)/86400000); }

                '670','671','672','680','700','701','702','710','711','712','720'];
function mkPhone(seed){
  const pre=PREFIXES[Math.floor(srng(seed*13+1)*PREFIXES.length)];
  const tail=String(Math.floor(srng(seed*17+3)*900+100)).padStart(3,'0');
  return `+212 ${pre}-***-${tail}`;

function mkPhoneUS(seed){
  const area=US_AREAS[Math.floor(srng(seed*19+11)*US_AREAS.length)];

  [],[],[],[],[],[],[],[],[],[],[],[],

const employees=EMP_BANS.map((bans,ei)=>({id:ei+1,name:`Emp-${String(ei+1).padStart(2,'0')}`,banDays:bans,numbers:[]}));
let _pSeq=0; const allNums=[];
employees.forEach(emp=>{
  const segs=emp.banDays.length+1;
  for(let s=0;s<segs;s++){
    _pSeq++;
    const startDay=s===0?0:emp.banDays[s-1];
    const endDay=s<emp.banDays.length?emp.banDays[s]-1:N_DAYS-1;
    const banDay=s<emp.banDays.length?emp.banDays[s]:null;
    const num={phone:mkPhone(_pSeq*41+emp.id*7),empId:emp.id,empName:emp.name,
      startDay,endDay,startDate:d2s(startDay),endDate:d2s(endDay),
      banDate:banDay!==null?d2s(banDay):null,fans:0,
      stable:emp.banDays.length===0,isCurrent:banDay===null};
    emp.numbers.push(num); allNums.push(num);
  }
});

// US mirror — same employees/fans, different phone format
const allNumsUS = allNums.map((n,i)=>Object.assign({},n,{phone:mkPhoneUS((i+1)*53+n.empId*11)}));

for(let day=0;day<N_DAYS;day++){
  const total=DAILY[day];
  const active=employees.map(emp=>emp.numbers.find(n=>n.startDay<=day&&day<=n.endDay));
  const w=active.map((_,i)=>0.55+srng(day*151+i*37+9)*0.9);
  const ws=w.reduce((a,b)=>a+b,0);
  const dist=w.map(x=>Math.floor(total*x/ws));
  dist[0]+=total-dist.reduce((a,b)=>a+b,0);
  active.forEach((n,i)=>{if(n)n.fans+=dist[i];});
}

              <th style="text-align:right">${t('dy.col.fans')}</th>
              <th style="text-align:right">${t('dy.col.cum')}</th>
              <th>${t('dy.col.period')}</th>

          </thead>
          <tbody>
            ${(()=>{let c=0;return DAILY.map((f,i)=>{
              c+=f; const dt=d2s(i), dw=DOW[new Date(dt+'T00:00:00Z').getUTCDay()];
              const hi=dt===selDate, mo=dt.slice(5,7);
              const period=mo==='01'?MO[0]:mo==='02'?MO[1]:MO[2];
              return `<tr style="${hi?'background:rgba(168,85,247,.1);':''}" onclick="selDate='${dt}';rDy()">
                <td style="color:var(--muted)">${i+1}</td>

}

// ═══════════════════════════════════════════════
// WHATSAPP NUMBERS
// ═══════════════════════════════════════════════
let waFilter='all';
function rWa(){
  const el=document.getElementById('v-wa');
  const numList = currentAcct().numType==='us' ? allNumsUS : allNums;
  const show=waFilter==='stable'?numList.filter(n=>n.stable)
            :waFilter==='banned'?numList.filter(n=>n.banDate)
            :waFilter==='current'?numList.filter(n=>n.isCurrent)
            :numList;
  const filters=[['all',t('wa.f.all')],['current',t('wa.f.cur')],['stable',t('wa.f.stable')],['banned',t('wa.f.banned')]];
  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:22px">
      <div>
        <div class="section-title">${t('wa.title')}</div>
        <div class="section-sub" style="margin-bottom:0">${t('wa.sub')}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${filters.map(([f,lb])=>`<button onclick="waFilter='${f}';rWa()" style="padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
          border:1px solid ${waFilter===f?'var(--accent)':'var(--border)'};
          background:${waFilter===f?'rgba(168,85,247,.18)':'transparent'};
          color:${waFilter===f?'#c084fc':'var(--muted)'};">${lb}</button>`).join('')}
      </div>
    </div>
    <div class="grid-4" style="margin-bottom:20px">
      <div class="stat-card"><div style="font-size:11px;color:var(--muted);margin-bottom:6px">${t('wa.s.total')}</div><div style="font-size:22px;font-weight:700">86</div></div>
      <div class="stat-card"><div style="font-size:11px;color:var(--muted);margin-bottom:6px">${t('wa.s.stable')}</div><div style="font-size:22px;font-weight:700;color:var(--success)">12</div></div>
      <div class="stat-card"><div style="font-size:11px;color:var(--muted);margin-bottom:6px">${t('wa.s.banned')}</div><div style="font-size:22px;font-weight:700;color:var(--danger)">49</div></div>
      <div class="stat-card"><div style="font-size:11px;color:var(--muted);margin-bottom:6px">${t('wa.s.fans')}</div><div style="font-size:22px;font-weight:700" class="gradient-text">${N(TOTAL_A)}</div></div>
    </div>
    <div class="card">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>${t('wa.col.emp')}</th><th>${t('wa.col.phone')}</th>
              <th>${t('wa.col.from')}</th><th>${t('wa.col.until')}</th>
              <th>${t('wa.col.ban')}</th>
              <th style="text-align:right">${t('wa.col.fans')}</th>
              <th>${t('wa.col.status')}</th>
            </tr>
          </thead>
          <tbody>

              <td style="font-weight:500">${n.empName}</td>
              <td class="mono" style="font-size:12px;color:var(--info)">${n.phone}</td>
              <td style="font-size:12px;color:var(--muted)">${n.startDate}</td>
              <td style="font-size:12px;color:var(--muted)">${n.endDate}</td>
              <td>${n.banDate?`<span class="badge badge-red">🚫 ${n.banDate}</span>`:`<span style="color:var(--muted);font-size:12px">—</span>`}</td>
              <td style="text-align:right;font-weight:600">${N(n.fans)}</td>
              <td>${n.stable?`<span class="badge badge-green">${t('wa.badge.stable')}</span>`
                        :n.isCurrent?`<span class="badge badge-purple">${t('wa.badge.cur')}</span>`

          <tfoot>
            <tr class="tfoot-row">

}

// ═══════════════════════════════════════════════
// LANDING PAGES
// ═══════════════════════════════════════════════
function rLp(){
  const el=document.getElementById('v-lp');
  const ac=lpData.filter(l=>l.status==='active').length;
  const tf=lpData.reduce((s,l)=>s+l.fans,0);
  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px">
      <div>
        <div class="section-title">${t('lp.title')}</div>
        <div class="section-sub" style="margin-bottom:0">${t('lp.sub',ac)}</div>
      </div>
      <button class="btn-primary" style="width:auto;padding:9px 18px;font-size:13px" onclick="alert(t('lp.noperm'))">${t('lp.add')}</button>
    </div>
    <div id="lpForm" style="display:none" class="card" style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:600;margin-bottom:14px">${t('lp.form.title')}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div><label class="lbl">${t('lp.form.label')}</label><input id="nll" class="inp" placeholder="${t('lp.form.label.ph')}"></div>
        <div><label class="lbl">${t('lp.form.status')}</label>
          <select id="nls" class="inp">
            <option value="active">${t('lp.form.active')}</option>
            <option value="inactive">${t('lp.form.inactive')}</option>
          </select>
        </div>
      </div>
      <div style="margin-bottom:14px"><label class="lbl">${t('lp.form.url')}</label><input id="nlu" class="inp" placeholder="https://..."></div>
      <div style="display:flex;gap:8px">
        <button class="btn-primary" style="width:auto;padding:9px 18px;font-size:13px" onclick="addLp()">${t('lp.form.save')}</button>
        <button onclick="document.getElementById('lpForm').style.display='none'" class="btn-sm" style="padding:8px 14px">${t('lp.form.cancel')}</button>
      </div>
    </div>
    <div style="display:grid;gap:10px">
      ${lpData.map((lp,i)=>`
        <div class="card lp-card-inner" style="display:flex;align-items:center;gap:16px">
          <div style="width:42px;height:42px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;
            background:${lp.status==='active'?'rgba(16,185,129,.12)':'rgba(107,114,128,.1)'}">${lp.status==='active'?'🔗':'🔒'}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
              <span style="font-weight:600;font-size:14px">${lp.label}</span>
              <span class="badge ${lp.status==='active'?'badge-green':'badge-gray'}">${t('lp.badge.'+lp.status)}</span>
            </div>
            <div class="mono" style="font-size:11px;color:var(--info);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:500px">${lp.url}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:3px">${t('lp.created')}: ${lp.created} &nbsp;·&nbsp; ${t('lp.fans')}: <strong style="color:var(--text)">${N(lp.fans)}</strong></div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn-sm" onclick="alert(t('lp.noperm'))">${lp.status==='active'?t('lp.deactivate'):t('lp.activate')}</button>
            <button class="btn-sm" onclick="alert(t('lp.noperm'))">${t('lp.edit')}</button>
            <button class="btn-sm btn-danger" onclick="alert(t('lp.noperm'))">${t('lp.delete')}</button>
          </div>
        </div>`).join('')}
    </div>
    <div style="margin-top:14px;padding:12px 16px;background:var(--card2);border:1px solid var(--border);border-radius:10px;
      display:flex;justify-content:space-between;font-size:13px">
      <span style="color:var(--muted)">${t('lp.footer',lpData.length,ac,lpData.length-ac)}</span>
      <span>${t('lp.total')} <strong class="gradient-text">${N(tf)}</strong></span>
    </div>`;
}
function showLpForm(){document.getElementById('lpForm').style.display='block';}
function addLp(){
  const l=document.getElementById('nll').value.trim(), u=document.getElementById('nlu').value.trim(), s=document.getElementById('nls').value;
  if(!l||!u){alert(t('lp.alert.empty'));return;}
  lpData.push({id:lpNextId++,label:l,url:u,status:s,fans:0,created:new Date().toISOString().slice(0,10)});rLp();
}
function toggleLp(i){lpData[i].status=lpData[i].status==='active'?'inactive':'active';rLp();}
function editLp(i){
  const lp=lpData[i];
  const nl=prompt(t('lp.prompt.label'),lp.label); if(nl===null)return;
  const nu=prompt(t('lp.prompt.url'),lp.url); if(nu===null)return;
  lpData[i].label=nl||lp.label; lpData[i].url=nu||lp.url; rLp();
}
function delLp(i){if(!confirm(t('lp.confirm.del',lpData[i].label)))return;lpData.splice(i,1);rLp();}

        </div>
        <div style="text-align:center;padding:14px;background:var(--surface);border-radius:10px">
          <div style="font-size:24px;font-weight:700;color:var(--info)">34ms</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">${t('ap.h.latency')}</div>
        </div>
        <div style="text-align:center;padding:14px;background:var(--surface);border-radius:10px">
          <div style="font-size:24px;font-weight:700;color:var(--muted)">0</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">${t('ap.h.keys')}</div>

function revealTok(i){
  const m=document.getElementById('tokMsg'+i);
  m.textContent=t('ap.noperm'); m.style.display='block';
  setTimeout(()=>{m.style.display='none';},3500);
}

// ═══════════════════════════════════════════════
// SIDEBAR TOGGLE
// ═══════════════════════════════════════════════
const isMobile = () => window.innerWidth <= 768;

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sbOverlay');
  const isOpen = sb.classList.contains('open');
  if (isOpen) { sb.classList.remove('open'); ov.classList.remove('show'); }
  else         { sb.classList.add('open');    ov.classList.add('show'); }
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sbOverlay').classList.remove('show');
}

let desktopCollapsed = false;
function toggleDesktopSidebar() {
  desktopCollapsed = !desktopCollapsed;
  const sb   = document.getElementById('sidebar');
  const main = document.getElementById('mainArea');
  const btn  = document.getElementById('desktopToggle');
  if (desktopCollapsed) {
    sb.classList.add('collapsed'); main.classList.add('full'); btn.textContent = '▶';
  } else {
    sb.classList.remove('collapsed'); main.classList.remove('full'); btn.textContent = '◀';
  }
}

// close sidebar on nav click (mobile)
function go(v) {
  curV = v;
  VIEWS.forEach(x => {
    document.getElementById('v-' + x).style.display = x === v ? 'block' : 'none';
    document.getElementById('n-' + x).classList.toggle('active', x === v);
  });
  if (isMobile()) closeSidebar();
  ({ov:rOv, dy:rDy, wa:rWa, lp:rLp, ap:rAp})[v]();
}

function onProjChange(sel) {
  const def = currentAcct().proj;
  if (sel.value !== def) {
    alert(t('sb.proj.noperm'));
    sel.value = def;
  }
}

  document.getElementById('loginPage').style.display='none';
